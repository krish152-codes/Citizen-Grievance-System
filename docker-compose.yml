version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: sheharsetu-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: sheharsetu

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sheharsetu-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/sheharsetu
      JWT_SECRET: ${JWT_SECRET:-sheharsetu_secret_change_me}
      JWT_EXPIRE: 7d
      NODE_ENV: production
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sheharsetu-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
